services:
  postgres:
    image: postgres:16
    container_name: chatbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anacity_chatbot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-anacity_chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: chatbot-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-server:
    image: ${MOCK_SERVER_IMAGE}
    container_name: chatbot-mock-server
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${WEB_IMAGE}
    container_name: chatbot-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-anacity_chatbot}
      REDIS_URL: redis://redis:6379/0
      SESSION_HMAC_SECRET: ${SESSION_HMAC_SECRET}
      MOCK_SERVER_URL: http://mock-server:3000
      MOCK_SERVER_EMAIL: ${MOCK_SERVER_EMAIL:-dn.user.a@gmail.com}
      MOCK_SERVER_PASSWORD: ${MOCK_SERVER_PASSWORD:-password}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.com}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:31b-cloud}
      PORT: 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ${WEB_IMAGE}
    container_name: chatbot-migrate
    profiles: ["ops"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-anacity_chatbot}
      REDIS_URL: redis://redis:6379/0
      SESSION_HMAC_SECRET: ${SESSION_HMAC_SECRET}
      MOCK_SERVER_URL: http://mock-server:3000
      MOCK_SERVER_EMAIL: ${MOCK_SERVER_EMAIL:-dn.user.a@gmail.com}
      MOCK_SERVER_PASSWORD: ${MOCK_SERVER_PASSWORD:-password}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.com}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:31b-cloud}
    command: ["bash", "scripts/release_web.sh"]

volumes:
  postgres_data:
  redis_data:
